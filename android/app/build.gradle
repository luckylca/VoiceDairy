plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
}

apply from: file('../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle')
applyNativeModulesAppBuildGradle(project)

project.ext.vectoricons = [
    iconFontNames: ['MaterialCommunityIcons.ttf']
]
apply from: file('../../node_modules/react-native-vector-icons/fonts.gradle')

android {
    namespace 'com.voicedairy'
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId 'com.voicedairy'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName '0.1.0'
    }

    androidResources {
        noCompress += ['onnx']
    }
}

def projectRootDir = rootProject.projectDir.parentFile

tasks.register('prepareAsrAssets', Exec) {
    group = 'voicedairy'
    description = 'Downloads the SenseVoice model and sherpa-onnx Android JNI libraries when missing.'
    workingDir projectRootDir
    commandLine 'bash', new File(projectRootDir, 'scripts/prepare-asr-assets.sh').absolutePath
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('prepareAsrAssets')
}

def hermesEnabled = project.hasProperty('hermesEnabled') ? project.hermesEnabled : 'true'

dependencies {
    implementation 'com.facebook.react:react-android'

    if (hermesEnabled.toBoolean()) {
        implementation 'com.facebook.react:hermes-android'
    } else {
        implementation 'org.webkit:android-jsc:+'
    }
}
