name: ASR Assets

on:
  workflow_dispatch:

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs bzip2 tar curl
          git lfs install
