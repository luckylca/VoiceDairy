name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  npm-typecheck:
    name: npm install and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Validate installer scripts
        run: |
          node --check scripts/install-with-proxy.js
          node --check scripts/patch-llama-rn-bridge.js

      - name: Install dependencies
        run: npm install --silent

      - name: Verify llama legacy bridge patch
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('node_modules/llama.rn/src/NativeRNLlama.ts', 'utf8');
          if (!source.includes('NativeModules.RNLlama')) {
            throw new Error('llama.rn legacy NativeModules fallback was not installed');
          }
          if (!source.includes('NativeModules count=')) {
            throw new Error('llama.rn native module diagnostics were not installed');
          }
          if (!fs.existsSync('node_modules/llama.rn/android/src/main/java/com/rnllama/NativeRNLlamaSpec.java')) {
            throw new Error('llama.rn bridge compatibility spec is missing');
          }

          const app = fs.readFileSync(
            'android/app/src/main/java/com/voicedairy/MainApplication.kt',
            'utf8',
          );
          const pkg = fs.readFileSync(
            'android/app/src/main/java/com/voicedairy/asr/SherpaAsrPackage.java',
            'utf8',
          );
          if (!app.includes('removeAll { it.javaClass.name == "com.rnllama.RNLlamaPackage" }')) {
            throw new Error('llama.rn TurboReactPackage is not removed from PackageList');
          }
          if (!pkg.includes('new RNLlamaModule(reactContext)')) {
            throw new Error('RNLlamaModule is not directly registered through the legacy ReactPackage');
          }
          NODE

      - name: Run TypeScript check
        run: |
          set -o pipefail
          npx tsc --noEmit --pretty false 2>&1 | tee typescript-check.log

      - name: Upload TypeScript check log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-check-log
          path: typescript-check.log

  android-debug-build:
    name: Android debug build
    runs-on: ubuntu-latest
    needs: npm-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gradle 8.7
        run: |
          curl -L -o gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Show Java, Node, npm and Gradle versions
        run: |
          java -version
          node --version
          npm --version
          gradle --version

      - name: Install dependencies
        run: npm install --silent

      - name: Build Android debug APK
        run: |
          set -o pipefail
          cd android
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee ../android-build.log

      - name: Upload Android build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android-build.log
