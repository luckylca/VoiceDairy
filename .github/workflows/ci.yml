name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  npm-typecheck:
    name: npm install and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --silent

      - name: Run TypeScript check
        run: npx tsc --noEmit --pretty false

  android-debug-build:
    name: Android debug build
    runs-on: ubuntu-latest
    needs: npm-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gradle 8.7
        run: |
          curl -L -o gradle-8.7-bin.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Show Java, Node, npm and Gradle versions
        run: |
          java -version
          node --version
          npm --version
          gradle --version

      - name: Install dependencies
        run: npm install --silent

      - name: Build Android debug APK
        run: |
          set -o pipefail
          cd android
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee ../android-build.log

      - name: Upload Android build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: android-build.log
